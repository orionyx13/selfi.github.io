<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Aurelia Putri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Page-specific styles */
    .page-hero {
      padding: calc(var(--nav-h) + 64px) 0 64px;
      background: linear-gradient(135deg, var(--rose-pale) 0%, var(--cream) 60%);
      text-align: center;
    }

    .page-hero .section-eyebrow {
      justify-content: center;
    }

    .page-hero .section-eyebrow::before { display: none; }

    .page-hero .section-title { font-size: clamp(40px, 5vw, 64px); }

    .page-hero p {
      font-size: 15px;
      color: var(--text-muted);
      margin-top: 12px;
    }

    .gallery-page-filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 40px 0 0;
    }

    .gallery-full-section {
      padding: 64px 0 100px;
      background: var(--cream);
    }

    .gallery-count {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
      text-align: right;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,10,8,0.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      padding: 24px;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 900px;
      width: 100%;
    }

    .lightbox-img {
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 12px;
      display: block;
    }

    .lightbox-caption {
      text-align: center;
      margin-top: 16px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: rgba(255,255,255,0.7);
    }

    .lightbox-close {
      position: absolute;
      top: -48px;
      right: 0;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 28px;
      cursor: pointer;
      transition: color 0.2s;
      line-height: 1;
    }

    .lightbox-close:hover { color: white; }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.12);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .lightbox-nav:hover { background: rgba(255,255,255,0.22); }
    .lightbox-nav.prev { left: -60px; }
    .lightbox-nav.next { right: -60px; }

    @media (max-width: 768px) {
      .lightbox-nav.prev { left: 0; }
      .lightbox-nav.next { right: 0; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <div class="nav-logo"><a href="index.html" style="color:inherit;text-decoration:none">Aurelia <span>✦</span></a></div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#biodata">Biodata</a></li>
      <li><a href="gallery.html" class="nav-active">Gallery</a></li>
      <li><a href="music.html">Music</a></li>
    </ul>
    <button class="nav-burger" id="navBurger"><span></span><span></span><span></span></button>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="container">
      <p class="section-eyebrow">Visual Stories</p>
      <h1 class="section-title">My <em>Gallery</em></h1>
      <p id="gallerySubtitle">Semua momen yang ingin aku abadikan</p>
      <div class="gallery-page-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="foto">Foto</button>
        <button class="filter-btn" data-filter="travel">Travel</button>
        <button class="filter-btn" data-filter="daily">Daily</button>
      </div>
    </div>
  </div>

  <!-- GALLERY FULL -->
  <section class="gallery-full-section">
    <div class="container">
      <p class="gallery-count" id="galleryCount"></p>
      <div class="gallery-grid" id="galleryFull"></div>
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-inner">
      <button class="lightbox-close" id="lightboxClose">✕</button>
      <button class="lightbox-nav prev" id="lightboxPrev">‹</button>
      <img class="lightbox-img" id="lightboxImg" src="" alt="" />
      <button class="lightbox-nav next" id="lightboxNext">›</button>
      <p class="lightbox-caption" id="lightboxCaption"></p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <p class="footer-name">Aurelia Putri Santoso</p>
      <p class="footer-copy">Made with ♡ · 2025</p>
      <div class="footer-socials">
        <a href="#">Instagram</a><a href="#">TikTok</a><a href="#">Pinterest</a>
      </div>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    const galleryFull  = document.getElementById("galleryFull");
    const galleryCount = document.getElementById("galleryCount");
    let visiblePhotos  = [...PHOTOS];
    let lightboxIdx    = 0;

    /* ── Build gallery grid ── */
    function buildGallery(photos) {
      galleryFull.innerHTML = "";
      galleryCount.textContent = photos.length + " foto";

      photos.forEach((p, i) => {
        const isWide = i % 5 === 0;   // setiap item ke-0 dari grup 5 jadi wide
        const div = document.createElement("div");
        div.className = "g-item" + (isWide ? " g-wide" : "");
        div.dataset.cat = p.cat;
        div.dataset.idx = i;
        div.innerHTML = `
          <img src="${p.src}" alt="${p.caption}"
               onerror="this.parentNode.classList.add('no-img')" />
          <div class="g-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" width="36" height="36">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <span>${p.caption}</span>
          </div>
          <div class="g-overlay"><span>${p.caption}</span></div>`;

        div.addEventListener("click", () => openLightbox(i, photos));
        galleryFull.appendChild(div);
      });
    }

    /* ── Filter ── */
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const cat = btn.dataset.filter;
        visiblePhotos = cat === "all" ? [...PHOTOS] : PHOTOS.filter(p => p.cat === cat);
        buildGallery(visiblePhotos);
      });
    });

    /* ── Lightbox ── */
    function openLightbox(idx, photos) {
      lightboxIdx = idx;
      const lb = document.getElementById("lightbox");
      lb.classList.add("open");
      updateLightbox(photos);
    }

    function updateLightbox(photos) {
      const p = photos[lightboxIdx];
      document.getElementById("lightboxImg").src       = p.src;
      document.getElementById("lightboxCaption").textContent = p.caption;
    }

    document.getElementById("lightboxClose").addEventListener("click", () => {
      document.getElementById("lightbox").classList.remove("open");
    });

    document.getElementById("lightboxPrev").addEventListener("click", () => {
      lightboxIdx = (lightboxIdx - 1 + visiblePhotos.length) % visiblePhotos.length;
      updateLightbox(visiblePhotos);
    });

    document.getElementById("lightboxNext").addEventListener("click", () => {
      lightboxIdx = (lightboxIdx + 1) % visiblePhotos.length;
      updateLightbox(visiblePhotos);
    });

    document.getElementById("lightbox").addEventListener("click", (e) => {
      if (e.target === document.getElementById("lightbox"))
        document.getElementById("lightbox").classList.remove("open");
    });

    document.addEventListener("keydown", (e) => {
      const lb = document.getElementById("lightbox");
      if (!lb.classList.contains("open")) return;
      if (e.key === "Escape") lb.classList.remove("open");
      if (e.key === "ArrowLeft") { lightboxIdx = (lightboxIdx - 1 + visiblePhotos.length) % visiblePhotos.length; updateLightbox(visiblePhotos); }
      if (e.key === "ArrowRight") { lightboxIdx = (lightboxIdx + 1) % visiblePhotos.length; updateLightbox(visiblePhotos); }
    });

    /* Init */
    buildGallery(PHOTOS);
  </script>
</body>
</html>
